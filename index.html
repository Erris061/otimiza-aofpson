<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <!-- Fonte moderna Montserrat -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    body {

      background: #000; /* fundo preto sólido */

      color: #fff;
      margin: 0;
      line-height: 1.7;
    }
    .banner {
      background: linear-gradient(135deg, #007bff, #111);
      text-align: center;
      padding: 80px 20px;
      border-bottom: 4px solid #007bff;
      box-shadow: 0 0 30px #007bff;
    }
    .banner h1 {
      font-size: 54px;
      font-weight: 700;
      margin:0;
      letter-spacing: 1px;
    }
    .banner p {
      font-size: 22px;
      color:#ccc;
      font-weight: 400;
      margin-top:15px;
    }
    .highlight {
      font-size:26px;
      font-weight:700;
      color:#007bff;
      margin-top:25px;
    }
    section {
      background:#111;
      padding:40px;
      border-radius:12px;
      margin:40px auto;
      max-width:1100px;
      box-shadow:0 0 25px #007bff;
    }
    section h2 {
      color:#007bff;
      text-align:center;
      margin-bottom:25px;
      font-size:32px;
      font-weight:600;
      letter-spacing:0.5px;
    }
    h3 {
      font-size:24px;
      font-weight:600;
      margin-bottom:15px;
    }
    ul {
      font-size:16px;
      font-weight:400;
    }
    .price {
      color:#007bff;
      font-weight:700;
      font-size:20px;
      margin-top:10px;
    }
    .note {
      font-size:14px;
      color:#ccc;
      margin-top:10px;
      font-style:italic;
    }
    .cta {
      text-align:center;
      margin:50px 0;
    }
    .cta a {
      display:inline-block;
      background:#007bff;
      color:#000;
      padding:18px 36px;
      font-weight:600;
      border-radius:10px;
      text-decoration:none;
      font-size:20px;
      transition:.3s;
      box-shadow:0 0 15px #007bff;
      letter-spacing:0.5px;
    }
    .cta a:hover {
      background:#fff;
      color:#007bff;
      transform:scale(1.05);
    }
    footer {
      background:#222;
      color:#ccc;
      text-align:center;
      padding:25px;
      border-top:3px solid #007bff;
      font-size:15px;
    }
    footer a {
      color:#007bff;
      text-decoration:none;
      font-weight:600;
    }

      display:flex;
      justify-content:space-around;
      flex-wrap:wrap;
      gap:20px;
      margin-top:30px;
    }
