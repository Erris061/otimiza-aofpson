<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Otimizações para Jogos e Desempenho Máximo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Fonte moderna Montserrat -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background: radial-gradient(circle at top left, #007bff, #111 70%);
      color: #fff;
      margin: 0;
      line-height: 1.7;
    }
    .banner {
      background: linear-gradient(135deg, #007bff, #222);
      text-align: center;
      padding: 80px 20px;
      border-bottom: 4px solid #007bff;
      box-shadow: 0 0 30px #007bff;
    }
    .banner h1 {
      font-size: 54px;
      font-weight: 700;
      margin:0;
      letter-spacing: 1px;
    }
    .banner p {
      font-size: 22px;
      color:#ccc;
      font-weight: 400;
      margin-top:15px;
    }
    .highlight {
      font-size:26px;
      font-weight:700;
      color:#007bff;
      margin-top:25px;
    }
